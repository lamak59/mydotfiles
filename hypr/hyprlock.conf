background {
    monitor =
    path = screenshot

    blur_passes = 3
    blur_size = 6

    noise = 0.02
    contrast = 1.1
    brightness = 0.9
    vibrancy = 0.15
}

label {
    monitor =

    text = cmd[update:1000] echo "$(date +"%H:%M")"

    color = rgba(c0caf5ff)

    font_size = 90
    font_family = JetBrainsMono Nerd Font

    position = 0, 120

    halign = center
    valign = center
}

label {
    monitor =

    text = cmd[update:60000] echo "$(date +"%A, %d %B")"

    color = rgba(7aa2f7ff)

    font_size = 22
    font_family = JetBrainsMono Nerd Font

    position = 0, 50

    halign = center
    valign = center
}

input-field {
    monitor =

    size = 280, 55

    outline_thickness = 2

    outer_color = rgba(7aa2f7ff)

    inner_color = rgba(24283bdd)

    font_color = rgba(c0caf5ff)

    fade_on_empty = false

    placeholder_text = Senha

    position = 0, -60

    halign = center
    valign = center

    rounding = 12
}
